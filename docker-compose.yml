services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./backend/nginx/ssl:/etc/nginx/ssl:ro
      - uploads-db:/app/uploads:ro
      - pong-static:/app/pong-static:ro
    depends_on:
      - logstash
      - frontend
      - auth
      - users
      - pong
      - pong-db
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "nginx"
  auth:
    build: ./backend/auth
    volumes:
      - auth-db-data:/app/prisma
    #ports:
    #  - "3001:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
      - OAUTH_42_CLIENT_ID=${OAUTH_42_CLIENT_ID}
      - OAUTH_42_CLIENT_SECRET=${OAUTH_42_CLIENT_SECRET}
      - OAUTH_42_REDIRECT_URI=${OAUTH_42_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
    depends_on:
      - users
      - logstash
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "auth"

  pong-db:
    build: ./backend/pong-db
    #ports:
    # - "3003:3000"
    volumes:
      - pong-db-data:/app/prisma
    depends_on:
      - logstash
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "pong-db"

  pong:
    build: ./backend/pong
    volumes:
      - pong-static:/app/src:ro #share the built files with the container
    #ports:
    #  - "3002:3000"
    depends_on:
      - auth
      - users
      - pong-db
      - logstash
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "pong"

  users:
    build: ./backend/users
    volumes:
      - users-db-data:/app/prisma
      - uploads-db:/app/uploads
    #ports:
    #  - "3004:3000"
    depends_on:
      - logstash
    environment:
      - NODE_ENV=${NODE_ENV}
      - USERS_URL=${USERS_URL}
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "users"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    #ports:
    #  - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - .:/workspace:ro
      - /app/node_modules
    command: bash -lc "npm run dev"
    depends_on:
      - logstash
      - auth
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "frontend"

networks:
  app-network:
    driver: bridge

volumes:
  es_data:
    name: ft_es_data
  es_certs:
    name: ft_es_certs
  pong-static:
  auth-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/auth-db
  users-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/users-db
  pong-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/pong-db
  uploads-db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/uploads