<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Pong</title>
	<link rel="stylesheet" href="/assets/css/output.css">
</head>
<body>
	<div id="app">
		<div class="scoreboard">
			<textarea id="p1name" class="p1name game-text" rows="1" cols="30" disabled> Player 1</textarea>
			<textarea id="p1score" class="p1score game-text" rows="1" cols="2" disabled>0</textarea>
						:
			<textarea id="p2score" class="p2score game-text" rows="1" cols="2" disabled>0</textarea>
			<textarea id="p2name" class="p2name game-text" rows="1" cols="30" disabled> Player 2</textarea>
		</div>
		<canvas id="board" tabindex="1"></canvas>
		
		
		<ul id="debugMenu" class="flex items-center list-none">
			<li>
			<form id= "player1Menu" class="player1Menu">
				<label class="game-text" for="name_p1">Player 1:</label>
				<input type="text" class="game-text" size="16" id="name_p1" name="name_p1" value="Ford Prefect"><br>
				<label class="game-text" for="p1Ai">AI </label>
				<input type="checkbox" id="p1Ai" name="p1Ai" checked><br>
				
				<label class="game-text" for="p1Up">Up: </label>
				<input class="game-text" type="text" size="9" id="p1Up" name="p1Up" value="Shift">
				<label class="game-text" for="p1Down">Down: </label>
				<input type="text" class="game-text" size="9" id="p1Down" name="p1Down" value="Control"><br><br>
				<input class="game-text" type="color" id="p1InnerCol" name="p1InnerCol" value="#ffffff">
				<label class="game-text" for="p1InnerCol">paddle inner color</label><br>
				<input class="game-text" type="color" id="p1OuterCol" name="p1OuterCol" value="#808080">
				<label class="game-text" for="p1OuterCol">paddle outer color</label><br>
				<input class="game-text" type="color" id="p1CornerCol" name="p1CornerCol" value="#ff0000">
				<label class="game-text" for="p1CornerCol">paddle corner color</label><br>

			</form>
			</li>
			<li>
			<form id= "player2Menu" class="player2Menu">
				<label class="game-text" for="name_p2">Player 2:</label>
				<input type="text" class="game-text" size="16" id="name_p2" name="name_p2" value="Zaphod Beeblebrox"><br>
				<label class="game-text" for="p2Ai" checked>AI</label>
				<input type="checkbox" id="p2Ai" name="p2Ai" checked><br>
				
				<label class="game-text" for="p2Up">Up: </label>
				<input type="text" class="game-text" size="9" id="p2Up" name="p2Up" value="ArrowUp">
				<label class="game-text" for="p2Down">Down: </label>
				<input type="text" class="game-text" size="9" id="p2Down" name="p2Down" value="ArrowDown"><br><br>
				<input class="game-text" type="color" id="p2InnerCol" name="p2InnerCol" value="#ffffff">
				<label class="game-text" for="p2InnerCol">paddle inner color</label><br>
				<input class="game-text" type="color" id="p2OuterCol" name="p2OuterCol" value="#808080">
				<label class="game-text" for="p2OuterCol">paddle outer color</label><br>
				<input class="game-text" type="color" id="p2CornerCol" name="p2CornerCol" value="#ff0000">
				<label class="game-text" for="p2CornerCol">paddle corner color</label><br>
			</form>
			</li>
			<li>
			<form id= "gameMenu2" class="gameMenu2">
				<select name="paddleSpeed" id="paddleSpeed">
					<option value="glacial">glacial</option>
					<option value="slow">slow</option>
					<option value="standard" selected >standard</option>
					<option value="fast">fast</option>
					<option value="fast">insane</option>
				</select>
				<label class="game-text" for="paddleSpeed">Paddle speed</label>
				<br>
				<select name="ballSpeed" id="ballSpeed">
					<option value="glacial">glacial</option>
					<option value="slow">slow</option>
					<option value="standard" selected >standard</option>
					<option value="fast">fast</option>
					<option value="fast">insane</option>
				</select>
				<label class="game-text" for="ballSpeed">Ball speed</label>
				<br>
				<select name="ballSize" id="ballSize" width="20">
					<option value="tiny">tiny</option>
					<option value="small">small</option>
					<option value="normal" selected >normal  </option>
					<option value="big">big</option>
					<option value="huge">huge</option>
				</select>
				<label class="game-text" for="ballSize">Ball size</label>
				<br><br>
				<input type="checkbox" id="multiball" name="multiball" checked>
				<label class="game-text" for="multiball" checked>Multiball</label><br>
				<label class="game-text" for="maxScore">max. Score: </label>
				<input type="text" class="game-text" size="2" id="maxScore" name="maxScore" value="3">
				<label class="game-text" for="trailLength">Trail length: </label>
				<input type="text" class="game-text" size="3" id="trailLength" name="trailLength" value="20"><br>
				<br>
				
			</form>
			</li>
			<li>
			<form id= "gameMenu" class="gameMenu">
				<input class="game-text" type="color" id="uiCol" name="uiCol" value="#ffffff">
				<label class="game-text" for="uiCol">UI color</label><br>
				<input class="game-text" type="color" id="ballCol" name="ballCol" value="#0000ff">
				<label class="game-text" for="ballCol">Ball color</label><br>
				<input class="game-text" type="color" id="innerBg" name="innerBg" value="#008000">
				<label class="game-text" for="innerBg">inner Background color</label><br>
				<input class="game-text" type="color" id="outerBg" name="outerBg" value="#000000">
				<label class="game-text" for="outerBg">outer Background color</label><br>
				<input type="submit" value="Restart">
			</form>
			</li>
		</ul>
			
	</div>
</body>
<script type = "module" src = "pong/pong.js"></script>
</html>
