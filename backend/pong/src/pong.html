<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Pong</title>
	<link rel="stylesheet" href="/assets/css/output.css">
</head>
<body>
	<div id = "config"
		/*names*/
		name_p1 = 		"Ford Prefect"
		name_p2 = 		"Zaphod Beeblebrox"
	
		/*colors*/
		innerBg =		"green"
		outerBg = 		"black"
		uiCol =			"white"
		ballR =			"0"
		ballG =			"0"
		ballB =			"255"
		trailLength = 	"20"
		
		p1InnerCol =	"white"
		p1OuterCol =	"grey"
		p1CornerCol =	"red"
		
		p2InnerCol =	"white"
		p2OuterCol =	"grey"
		p2CornerCol =	"red"
		
		/*game vars*/
		singlePlayer =	"true"
		ballSpeed =		"standard"	/*glacial, slow, standard, fast, insane*/
		ballSize = 		"normal"	/*tiny, small, normal, big, huge*/
		paddleSpeed =	"standard"	/*glacial, slow, standard, fast, insane*/
		
		maxScore = 		"3"
		
		/*controls*/
		p1Up = 			"Shift"
		p1Down = 		"Control"
		p2Up = 			"ArrowUp"
		p2Down = 		"ArrowDown"
	></div>
	<div id="app">
		<div class="scoreboard">
			<textarea id="p1name" class="p1name game-text" rows="1" cols="30" disabled> Player 1</textarea>
			<textarea id="p1score" class="p1score game-text" rows="1" cols="2" disabled>0</textarea>
			:
			<textarea id="p2score" class="p2score game-text" rows="1" cols="2" disabled>0</textarea>
			<textarea id="p2name" class="p2name game-text" rows="1" cols="30" disabled> Player 2</textarea>
		</div>
		<canvas id="board" tabindex="1"></canvas>
	</div>
</body>
<script type = "module" src = "pong/pong.js"></script>
</html>
