<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Pong</title>
	<style>
		textarea {
			resize: none;
			background: transparent;
			color: #66fcf1;
			border: none;
			font-family: 'jura', sans-serif;
			font-size: 25px;
		}
		.scoreboard {
			display: flex;
			justify-content: center;
			color: #66fcf1;
			font-family: 'jura', sans-serif;
			font-size: 25px;
		}
		.p1score {direction: rtl;}
		.p1name {direction: rtl;}
		canvas {
			display: block;
			left: 0;
			top: 0;
			height: 100%;
			width: 100%;
		}
</style>
</head>
<body>
	<div id = "config"
		/*names*/
		name_p1 = 		"Ford Prefect"
		name_p2 = 		"Zaphod Beeblebrox"
	
		/*colors*/
		innerBg =		"green"
		outerBg = 		"black"
		uiCol =			"white"
		ballR =			"0"
		ballG =			"0"
		ballB =			"255"
		trailLength = 	"20"
		
		p1InnerCol =	"white"
		p1OuterCol =	"grey"
		p1CornerCol =	"red"
		
		p2InnerCol =	"white"
		p2OuterCol =	"grey"
		p2CornerCol =	"red"
		
		/*game vars*/
		singlePlayer =	"false"
		ballSpeed =		"standard"	/*glacial, slow, standard, fast, insane*/
		ballSize = 		"normal"	/*tiny, small, normal, big, huge*/
		paddleSpeed =	"standard"	/*glacial, slow, standard, fast, insane*/
		
		maxScore = 		"3"
		
		/*controls*/
		p1Up = 			"Shift"
		p1Down = 		"Control"
		p2Up = 			"ArrowUp"
		p2Down = 		"ArrowDown"
	></div>
	<div class = "scoreboard">
	<textarea id = "p1name" class = "p1name" rows = "1" cols = "30" disabled> Player 1</textarea>
	<textarea id = "p1score" class = "p1score" rows = "1" cols = "2" disabled>0</textarea> : <textarea id = "p2score" class = "p2score" rows = "1" cols = "2" disabled>0</textarea>
	<textarea id = "p2name" class = "p2name" rows = "1" cols = "30" disabled> Player 2</textarea>
	</div>
	<canvas id = "board" tabindex = "1"></canvas>
</body>
<script type = "module" src = "pong/pong.js"></script>
</html>
