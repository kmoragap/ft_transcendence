name: Container Build and Test

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate SSL certificates for testing
        run: |
          echo "🔐 Generating SSL certificates for CI/CD..."
          bash tools/ssl_generator.sh

      - name: Verify Docker Compose file
        run: |
          echo "📋 Validating docker-compose.yml..."
          docker-compose config

      - name: Build Docker images
        run: |
          echo "🔨 Building all Docker images..."
          docker-compose build --progress=plain
        env:
          DOCKER_BUILDKIT: 1

      - name: Start containers
        run: |
          echo "🚀 Starting all containers..."
          docker-compose up -d
        env:
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: development

      - name: Wait for containers to be healthy
        run: |
          echo "⏳ Waiting for containers to start..."
          sleep 20

          echo "📊 Checking container status..."
          docker-compose ps

      - name: Check if all containers are running
        run: |
          echo "🔍 Verifying all containers are running..."

          # Get list of expected services from docker-compose.yml
          EXPECTED_SERVICES="nginx auth pong-db pong users frontend"

          for service in $EXPECTED_SERVICES; do
            echo "Checking $service..."
            STATUS=$(docker-compose ps -q $service | xargs docker inspect -f '{{.State.Status}}' 2>/dev/null || echo "not found")

            if [ "$STATUS" != "running" ]; then
              echo "❌ Service $service is not running (status: $STATUS)"
              docker-compose logs $service
              exit 1
            else
              echo "✅ Service $service is running"
            fi
          done

          echo "✅ All containers are running successfully!"

      - name: Check container logs for errors
        run: |
          echo "📝 Checking container logs for critical errors..."

          # Check each service for critical errors
          SERVICES="nginx auth pong-db pong users frontend"

          for service in $SERVICES; do
            echo "--- Logs for $service ---"
            docker-compose logs --tail=50 $service

            # Check for common error patterns (non-fatal check)
            ERROR_COUNT=$(docker-compose logs $service | grep -iE "error|exception|fatal" | grep -viE "errorHandler|errorBoundary|errorLog|error.js|error.ts" | wc -l || echo "0")

            if [ "$ERROR_COUNT" -gt "10" ]; then
              echo "⚠️  Warning: Found $ERROR_COUNT potential errors in $service logs"
              echo "Review the logs above for details"
            fi
          done

      - name: Test basic connectivity
        run: |
          echo "🌐 Testing basic connectivity..."

          # Wait a bit more for services to be fully ready
          sleep 10

          # Check if nginx is responding (accept self-signed cert)
          echo "Testing NGINX on port 8080..."
          curl -f http://localhost:8080 || echo "⚠️  HTTP endpoint not responding yet"

          # Show network information
          echo "Docker networks:"
          docker network ls

          echo "✅ Basic connectivity tests completed"

      - name: Display container stats
        if: always()
        run: |
          echo "📊 Container resource usage:"
          docker stats --no-stream

      - name: Show detailed container information
        if: always()
        run: |
          echo "🔍 Detailed container status:"
          docker-compose ps -a

          echo ""
          echo "🐳 Docker images:"
          docker images | grep -E "ft_transcendence|nginx"

      - name: Cleanup - Show logs on failure
        if: failure()
        run: |
          echo "❌ Build or tests failed. Showing all logs..."
          docker-compose logs

      - name: Stop containers
        if: always()
        run: |
          echo "🛑 Stopping all containers..."
          docker-compose down -v
          echo "✅ Cleanup completed"
