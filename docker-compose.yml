services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
      #- "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./backend/users/uploads:/app/uploads:ro
      - pong-static:/app/pong-static:ro
    depends_on:
      - logstash
      - frontend
      - auth
      - users
      - pong
      - pong-db
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "nginx"
  auth:
    build: ./backend/auth
    volumes:
      - ./backend/auth/prisma/auth-db.sqlite:/app/prisma/auth-db.sqlite
    #ports:
    #  - "3001:3000"
    environment:
      - JWT_SECRET=change-this-in-prod
      - NODE_ENV=development
    depends_on:
      - users
      - logstash
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "auth"

  pong-db:
    build: ./backend/pong-db
    #ports:
    # - "3003:3000"
    depends_on:
      - logstash
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "pong-db"

  pong:
    build: ./backend/pong
    volumes:
      - pong-static:/app/src:ro #share the built files with the container
    #ports:
    #  - "3002:3000"
    depends_on:
      - auth
      - users
      - pong-db
      - logstash
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "pong"

  users:
    build: ./backend/users
    volumes:
      - ./backend/users/prisma/users-db.sqlite:/app/prisma/users-db.sqlite
      - ./backend/users/uploads:/app/uploads
    #ports:
    #  - "3004:3000"
    depends_on:
      - logstash
    environment:
      - NODE_ENV=development
      - USERS_URL=http://users:3000
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "users"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    #ports:
    #  - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - .:/workspace:ro
      - /app/node_modules
    command: bash -lc "npm run dev"
    depends_on:
      - logstash
      - auth
    networks:
      - app-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "frontend"

networks:
  app-network:
    driver: bridge

volumes:
  #esdata: {}
  es_data: 
    name: ft_es_data # how does this work? 
  es_certs: 
    name: ft_es_certs # TLS certs for ES nodes 
  pong-static:
