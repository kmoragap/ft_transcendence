input {
  gelf {
    port => 12201
    type => "gelf"
  }
  beats {
    port => 5044
    ssl_enabled => true
    ssl_certificate => "/usr/share/logstash/certs/logstash/logstash.crt"
    ssl_key         => "/usr/share/logstash/certs/logstash/logstash.key"

    # choose ONE of the following:
    ssl_client_authentication => none         # server-auth only
    # ssl_client_authentication => required   # mTLS: then also set:
    # ssl_certificate_authorities => ["/usr/share/logstash/certs/ca/ca.crt"]
  }
}

filter { 
  # Docker sends text in short_message; try parse JSON app logs
  json { source => "short_message" target => "event" remove_field => ["short_message"] }
  mutate {
    rename => { "facility" => "docker.facility" "host" => "docker.host" "container_name" => "docker.container_name" "level" => "log.level" }
    add_field => { "service.name" => "%{[docker][container_name]}" }
  }
  # if JSON parsing failed, keep original message
  if ![event] {
    mutate { rename => { "full_message" => "message" } }
  }
}

output {
  elasticsearch {
    hosts  => ["${ELASTICSEARCH_HOSTS}"]
    user   => "${ELASTICSEARCH_USERNAME}"
    password => "${ELASTICSEARCH_PASSWORD}"

    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/certs/ca/ca.crt"]

    # ilm_enabled => true
    # ilm_rollover_alias => "app-logs"
    # ilm_pattern => "000001"
    index => "logs-%{+YYYY.MM.dd}"

    # turn off features that need extra cluster perms
    manage_template => false
    ilm_enabled     => false
  }
  stdout { codec => rubydebug }
}



