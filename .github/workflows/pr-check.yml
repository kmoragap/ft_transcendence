name: Branch Up-to-Date Check
on:
  pull_request:
    branches:
      - dev

jobs:
  check-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify branch is up to date
        run: |
          git fetch origin dev
          # Check if the current branch is behind dev
          if ! git merge-base --is-ancestor origin/dev HEAD; then
            echo "❌ Branch is NOT up to date with dev. Please rebase or merge dev into your branch."
            exit 1
          else
            echo "✅ Branch is up to date with dev"
          fi
